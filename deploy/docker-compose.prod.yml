version: "3.8"

services:
  relay:
    build:
      context: .
      dockerfile: Dockerfile
    image: roomful-relay:latest
    restart: always
    ports:
      - "${RELAY_PORT:-8787}:8787"
    environment:
      - HOST=0.0.0.0
      - PORT=8787
      - AUTH_SECRET=${AUTH_SECRET:?AUTH_SECRET is required}
      - DATABASE_URL=${DATABASE_URL:?DATABASE_URL is required}
      - REDIS_URL=${REDIS_URL:-}
      - MAX_ROOMS=${MAX_ROOMS:-1000}
      - MAX_CONNECTIONS=${MAX_CONNECTIONS:-10000}
      - CORS_ORIGIN=${CORS_ORIGIN:-*}
      - NODE_ENV=production
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:8787/health', r => {process.exit(r.statusCode===200?0:1)})"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - roomful

  postgres:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-roomful}
      POSTGRES_USER: ${POSTGRES_USER:-roomful}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./scripts/db/migrations:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-roomful}"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: "2.0"
    networks:
      - roomful

  redis:
    image: redis:7-alpine
    restart: always
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-}
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.5"
    networks:
      - roomful

volumes:
  pgdata:

networks:
  roomful:
    driver: bridge
