services:
  relay:
    build:
      context: .
      dockerfile: Dockerfile
    image: erayatesdev/roomful:local
    env_file:
      - path: .env
        required: false
    ports:
      - '${PORT:-8787}:${PORT:-8787}'
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    profiles:
      - redis
    command: ['redis-server', '--save', '', '--appendonly', 'no']
    ports:
      - '6379:6379'
    volumes:
      - relay-redis-data:/data

volumes:
  relay-redis-data:
