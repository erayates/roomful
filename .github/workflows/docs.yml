name: Docs Site

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Only one docs deployment at a time.
concurrency:
  group: docs-pages
  cancel-in-progress: true

jobs:
  build:
    name: Build Docs Site
    runs-on: ubuntu-latest
    env:
      TURBO_TEAM: ${{ secrets.TURBO_TEAM }}
      TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          cache: pnpm
          node-version: 20

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.11.0

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Validate docs snippets
        run: pnpm docs:snippets

      - name: Build docs site
        run: pnpm --filter @cahoots/app-docs build

      - name: Build cursors Storybook
        run: pnpm --filter @cahoots/cursors build-storybook

      - name: Bundle Storybook into the docs site
        run: |
          mkdir -p apps/docs/dist/storybook
          cp -r packages/cursors/storybook-static/. apps/docs/dist/storybook/

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: apps/docs/dist

  deploy:
    name: Deploy Docs Site
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
