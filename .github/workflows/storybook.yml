name: Docs

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: docs-pages
  cancel-in-progress: true

jobs:
  build:
    name: Build Docs
    runs-on: ubuntu-latest
    env:
      PUBLIC_DOCSEARCH_API_KEY: ${{ secrets.PUBLIC_DOCSEARCH_API_KEY }}
      PUBLIC_DOCSEARCH_APP_ID: ${{ secrets.PUBLIC_DOCSEARCH_APP_ID }}
      PUBLIC_DOCSEARCH_INDEX_NAME: ${{ secrets.PUBLIC_DOCSEARCH_INDEX_NAME }}
      TURBO_TEAM: ${{ secrets.TURBO_TEAM }}
      TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          cache: pnpm
          node-version: 20

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.11.0

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Ensure DocSearch env is configured
        shell: bash
        run: |
          set -euo pipefail
          for name in PUBLIC_DOCSEARCH_APP_ID PUBLIC_DOCSEARCH_API_KEY PUBLIC_DOCSEARCH_INDEX_NAME; do
            if [ -z "${!name:-}" ]; then
              echo "::error::${name} secret is required for docs deployment."
              exit 1
            fi
          done

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Build docs site
        run: pnpm --filter @flockjs/app-docs build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: apps/docs/dist

  deploy:
    name: Deploy Docs
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
