name: CI

on:
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  validate:
    name: Validate (Node ${{ matrix.node-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node-version: [18, 20]
    env:
      TURBO_TEAM: ${{ secrets.TURBO_TEAM }}
      TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: pnpm

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.11.0

      - name: Restore Turbo cache
        uses: actions/cache@v4
        with:
          path: .turbo
          key: turbo-${{ runner.os }}-node-${{ matrix.node-version }}-${{ hashFiles('pnpm-lock.yaml', 'turbo.json') }}
          restore-keys: |
            turbo-${{ runner.os }}-node-${{ matrix.node-version }}-
            turbo-${{ runner.os }}-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Format check
        run: pnpm format:check

      - name: Verify workspace tsconfig inheritance
        run: pnpm verify:tsconfig-extends

      - name: Typecheck (workspaces)
        run: pnpm typecheck

      - name: Typecheck (root)
        run: pnpm typecheck:root

      - name: Test
        run: pnpm test

      - name: Test demo app
        run: pnpm --filter @flockjs/app-demo test

      - name: Validate docs snippets
        run: pnpm docs:snippets

      - name: Build
        run: pnpm build

      - name: Type declaration tests
        run: pnpm test:types

      - name: Verify packaged declarations
        run: pnpm verify:package-types

      - name: Build cursors Storybook
        run: pnpm --filter @flockjs/cursors build-storybook

  browser-integration:
    name: Browser Integration (Node 20)
    runs-on: ubuntu-latest
    env:
      TURBO_TEAM: ${{ secrets.TURBO_TEAM }}
      TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.11.0

      - name: Restore Turbo cache
        uses: actions/cache@v4
        with:
          path: .turbo
          key: turbo-${{ runner.os }}-node-20-browser-${{ hashFiles('pnpm-lock.yaml', 'turbo.json') }}
          restore-keys: |
            turbo-${{ runner.os }}-node-20-browser-
            turbo-${{ runner.os }}-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium firefox webkit

      - name: Build
        run: pnpm build

      - name: Browser integration tests
        run: pnpm test:integration

      - name: Demo browser integration tests
        run: pnpm test:integration:demo

      - name: Docs smoke tests
        run: pnpm test:docs

  package-consumer-smoke:
    name: Package Consumer Smoke (Node 20)
    runs-on: ubuntu-latest
    env:
      TURBO_TEAM: ${{ secrets.TURBO_TEAM }}
      TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.11.0

      - name: Restore Turbo cache
        uses: actions/cache@v4
        with:
          path: .turbo
          key: turbo-${{ runner.os }}-node-20-package-smoke-${{ hashFiles('pnpm-lock.yaml', 'turbo.json') }}
          restore-keys: |
            turbo-${{ runner.os }}-node-20-package-smoke-
            turbo-${{ runner.os }}-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Publish smoke tests
        run: pnpm smoke:publish

  relay-distribution:
    name: Relay Distribution
    runs-on: ubuntu-latest
    env:
      TURBO_TEAM: ${{ secrets.TURBO_TEAM }}
      TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.11.0

      - name: Restore Turbo cache
        uses: actions/cache@v4
        with:
          path: .turbo
          key: turbo-${{ runner.os }}-node-20-relay-distribution-${{ hashFiles('pnpm-lock.yaml', 'turbo.json') }}
          restore-keys: |
            turbo-${{ runner.os }}-node-20-relay-distribution-
            turbo-${{ runner.os }}-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build relay package
        run: pnpm --filter @flockjs/relay build

      - name: Verify relay package contents
        working-directory: packages/relay
        run: |
          npm pack --json --dry-run > pack-report.json
          node -e "const fs = require('node:fs'); const report = JSON.parse(fs.readFileSync('pack-report.json', 'utf8'))[0]; const disallowed = report.files.map((file) => file.path).filter((path) => path.includes('coverage/') || path.includes('.turbo/') || path.endsWith('.test.ts')); if (disallowed.length > 0) { console.error('Unexpected files in relay package:', disallowed); process.exit(1); }"

      - name: Pack relay tarball
        working-directory: packages/relay
        run: npm pack

      - name: Install relay CLI from tarball
        run: npm install -g ./packages/relay/flockjs-relay-*.tgz

      - name: Smoke test relay CLI
        shell: bash
        run: |
          set -euo pipefail
          flockjs-relay --port 8790 --host 127.0.0.1 &
          RELAY_PID=$!
          trap 'kill ${RELAY_PID}' EXIT
          for _ in $(seq 1 20); do
            if curl --fail --silent http://127.0.0.1:8790/health > /dev/null; then
              exit 0
            fi
            sleep 1
          done
          echo "Relay CLI did not become healthy in time."
          exit 1

      - name: Verify relay CLI version
        shell: bash
        run: |
          set -euo pipefail
          expected="flockjs-relay $(node -p "require('./packages/relay/package.json').version")"
          actual="$(flockjs-relay --version)"
          if [ "${actual}" != "${expected}" ]; then
            echo "Expected relay CLI version '${expected}', got '${actual}'."
            exit 1
          fi

      - name: Build relay Docker image
        run: docker build -t flockjs-relay:test .

      - name: Smoke test relay Docker image
        shell: bash
        run: |
          set -euo pipefail
          docker run -d --name flockjs-relay-test -p 8791:8787 flockjs-relay:test
          trap 'docker rm -f flockjs-relay-test' EXIT
          for _ in $(seq 1 20); do
            if curl --fail --silent http://127.0.0.1:8791/health > /dev/null; then
              exit 0
            fi
            sleep 1
          done
          echo "Relay Docker image did not become healthy in time."
          exit 1

      - name: Validate local compose example
        shell: bash
        run: |
          set -euo pipefail
          docker compose -f docker-compose.yml config > compose.local.rendered.yml
          grep -q "build:" compose.local.rendered.yml

      - name: Validate production compose example
        shell: bash
        run: |
          set -euo pipefail
          docker compose -f docker-compose.prod.yml config > compose.prod.rendered.yml
          grep -q "image: flockjs/relay:latest" compose.prod.rendered.yml
          if grep -q "build:" compose.prod.rendered.yml; then
            echo "Production compose config unexpectedly contains a build section."
            exit 1
          fi
