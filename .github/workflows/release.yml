name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  release:
    name: Release (Node 20)
    runs-on: ubuntu-latest
    env:
      TURBO_TEAM: ${{ secrets.TURBO_TEAM }}
      TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate release tag
        shell: bash
        run: |
          if [ "${GITHUB_REF_TYPE}" != "tag" ] || [[ "${GITHUB_REF_NAME}" != v* ]]; then
            echo "::error::Release workflow must run from a v* git tag."
            exit 1
          fi

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.11.0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - name: Restore Turbo cache
        uses: actions/cache@v4
        with:
          path: .turbo
          key: turbo-${{ runner.os }}-node-20-${{ hashFiles('pnpm-lock.yaml', 'turbo.json') }}
          restore-keys: |
            turbo-${{ runner.os }}-node-20-
            turbo-${{ runner.os }}-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Format check
        run: pnpm format:check

      - name: Verify workspace tsconfig inheritance
        run: pnpm verify:tsconfig-extends

      - name: Typecheck (workspaces)
        run: pnpm typecheck

      - name: Typecheck (root)
        run: pnpm typecheck:root

      - name: Test
        run: pnpm test

      - name: Validate docs snippets
        run: pnpm docs:snippets

      - name: Build
        run: pnpm build

      - name: Verify relay CLI version
        shell: bash
        run: |
          expected="roomful-relay $(node -p "require('./packages/relay/package.json').version")"
          actual="$(node packages/relay/dist/cli.js --version)"
          if [ "${actual}" != "${expected}" ]; then
            echo "Expected relay CLI version '${expected}', got '${actual}'."
            exit 1
          fi

      - name: Type declaration tests
        run: pnpm test:types

      - name: Verify packaged declarations
        run: pnpm verify:package-types

      - name: Publish smoke tests
        run: pnpm smoke:publish

      - name: Ensure NPM token is configured
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          if [ -z "${NPM_TOKEN}" ]; then
            echo "::error::NPM_TOKEN secret is required for release publishing."
            exit 1
          fi

      - name: Release status
        shell: bash
        run: |
          if [ -f .changeset/pre.json ]; then
            echo "Changesets pre mode is active; changeset files persist after versioning, so skip the status check."
            exit 0
          fi

          changeset_count=$(find .changeset -maxdepth 1 -type f -name '*.md' ! -name README.md | wc -l | tr -d ' ')

          if [ "$changeset_count" = "0" ]; then
            echo "No pending changesets found; assuming this is a versioned release commit."
            exit 0
          fi

          pnpm release:status

      - name: Publish packages
        run: pnpm release
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  docker:
    name: Publish Relay Docker Image
    runs-on: ubuntu-latest
    needs: release
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Ensure Docker Hub credentials are configured
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
        run: |
          if [ -z "${DOCKERHUB_USERNAME}" ] || [ -z "${DOCKERHUB_TOKEN}" ]; then
            echo "::error::DOCKERHUB_USERNAME and DOCKERHUB_TOKEN secrets are required for relay image publishing."
            exit 1
          fi

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract Docker metadata
        id: docker-meta
        uses: docker/metadata-action@v5
        with:
          images: erayatesdev/roomful
          tags: |
            type=raw,value=latest,enable=${{ !contains(github.ref_name, '-') }}
            type=semver,pattern={{version}},value=${{ github.ref_name }}

      - name: Build and push relay image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.docker-meta.outputs.tags }}
          labels: ${{ steps.docker-meta.outputs.labels }}

  github-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs:
      - release
    permissions:
      contents: write
    steps:
      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          prerelease: ${{ contains(github.ref_name, '-') }}
