name: Bug Report
description: Report a reproducible defect in Cahoots
labels: [bug, triage]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug. Please provide a minimal reproducible case.

  - type: input
    id: package
    attributes:
      label: Affected package
      description: Which package is affected?
      placeholder: '@cahoots/core'
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Package version or commit SHA
      placeholder: '0.0.0-dev or commit SHA'
    validations:
      required: true

  - type: dropdown
    id: environment
    attributes:
      label: Runtime environment
      options:
        - Browser
        - Node.js
        - Both
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction steps
      description: List exact steps to reproduce.
      placeholder: |
        1. Create room with ...
        2. Connect two tabs ...
        3. Emit event ...
        4. Observe error ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Logs, stack traces, screenshots
      description: Include relevant debug output.
      render: shell
    validations:
      required: true

  - type: input
    id: browser
    attributes:
      label: Browser and version
      description: Required when runtime is Browser/Both. For Node.js-only issues, use N/A.
      placeholder: 'Chrome 124, Firefox 123, Safari 17'
    validations:
      required: true

  - type: input
    id: os
    attributes:
      label: OS
      placeholder: 'Windows 11, macOS 14, Ubuntu 22.04'

  - type: checkboxes
    id: checks
    attributes:
      label: Pre-submission checks
      options:
        - label: I searched existing issues and discussions.
          required: true
        - label: I provided enough details to reproduce this bug.
          required: true
