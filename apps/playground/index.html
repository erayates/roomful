<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Interactive FlockJS playground for room presence, shared state, events, and transports."
    />
    <title>FlockJS Playground</title>
  </head>
  <body>
    <main class="shell">
      <section class="hero" aria-labelledby="page-title">
        <div>
          <p class="eyebrow">FlockJS API explorer</p>
          <h1 id="page-title">Open two tabs and watch a room come alive.</h1>
          <p class="hero__copy">
            Connect with broadcast locally, then switch to WebRTC or WebSocket when a relay is
            running.
          </p>
        </div>
        <div class="signal-board" aria-label="Live connection summary">
          <div class="signal-board__line"></div>
          <dl>
            <div>
              <dt>Status</dt>
              <dd id="status-value">idle</dd>
            </div>
            <div>
              <dt>Transport</dt>
              <dd id="transport-value">not connected</dd>
            </div>
            <div>
              <dt>Peers</dt>
              <dd id="peer-count-value">0</dd>
            </div>
          </dl>
        </div>
      </section>

      <section class="workspace" aria-label="Playground controls">
        <form class="panel panel--controls" id="playground-form">
          <div class="panel__heading">
            <h2>Room setup</h2>
            <span id="status-pill" class="status-pill" data-state="idle">idle</span>
          </div>

          <label>
            <span>Room ID</span>
            <input id="room-id-input" name="roomId" autocomplete="off" />
          </label>

          <label>
            <span>Your name</span>
            <input id="name-input" name="name" autocomplete="name" />
          </label>

          <div class="field-row">
            <label>
              <span>Color</span>
              <input id="color-input" name="color" type="color" />
            </label>

            <label>
              <span>Transport</span>
              <select id="transport-input" name="transport">
                <option value="broadcast">broadcast</option>
                <option value="auto">auto</option>
                <option value="webrtc">webrtc</option>
                <option value="websocket">websocket</option>
              </select>
            </label>
          </div>

          <label>
            <span>Relay URL</span>
            <input id="relay-url-input" name="relayUrl" placeholder="ws://localhost:8787" />
          </label>

          <div class="actions">
            <button id="connect-button" type="button">Connect</button>
            <button id="disconnect-button" type="button">Disconnect</button>
            <button id="copy-link-button" type="button">Copy link</button>
            <button id="second-tab-button" type="button">Second tab</button>
          </div>
        </form>

        <section class="panel panel--document" aria-labelledby="document-title">
          <div class="panel__heading">
            <h2 id="document-title">Shared document</h2>
            <span id="click-count-value" class="metric">0 clicks</span>
          </div>
          <label>
            <span>Shared note</span>
            <textarea id="note-input" rows="7"></textarea>
          </label>
          <div class="actions">
            <button id="increment-button" type="button">Increment counter</button>
            <button id="broadcast-button" type="button">Broadcast hello</button>
          </div>
        </section>

        <section class="panel panel--peers" aria-labelledby="peers-title">
          <div class="panel__heading">
            <h2 id="peers-title">Peers</h2>
          </div>
          <ul id="peer-list" class="peer-list"></ul>
        </section>

        <section class="panel panel--log" aria-labelledby="log-title">
          <div class="panel__heading">
            <h2 id="log-title">Event log</h2>
          </div>
          <ol id="event-log" class="event-log"></ol>
        </section>
      </section>
    </main>
    <script type="module" src="/src/index.ts"></script>
  </body>
</html>
