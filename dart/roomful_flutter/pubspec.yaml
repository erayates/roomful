name: roomful_flutter
description: >-
  Flutter widgets and controllers for Roomful — presence, live cursors, comments, locks, and
  shared state over a self-hostable relay, built on the pure-Dart roomful core.
version: 0.1.0-alpha.4
homepage: https://roomful.dev
documentation: https://docs.roomful.dev
repository: https://github.com/erayates/roomful
issue_tracker: https://github.com/erayates/roomful/issues
topics:
  - collaboration
  - realtime
  - flutter
  - presence
  - widgets

environment:
  sdk: ^3.4.0
  flutter: '>=3.19.0'

dependencies:
  flutter:
    sdk: flutter
  roomful: ^0.1.0-alpha.10

dev_dependencies:
  flutter_lints: ^4.0.0
  flutter_test:
    sdk: flutter
